{{- if .Values.gatewayApi.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ include "app.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ include "app.fullname" . }}
    chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
  {{- if .Values.gatewayApi.annotations }}
  annotations:
{{ toYaml .Values.gatewayApi.annotations | indent 4 }}
  {{- end }}
spec:
  gatewayClassName: {{ .Values.gatewayApi.className | quote }}

  {{- if .Values.gatewayApi.addresses }}
  addresses:
{{ toYaml .Values.gatewayApi.addresses | nindent 4 }}
  {{- else if .Values.hosts.externalIP }}
  addresses:
    - type: IPAddress
      value: {{ .Values.hosts.externalIP }}
  {{- end }}

  listeners:
    {{- $root := .Values.gatewayApi }}

    {{- if .Values.gatewayApi.configureCertmanager }}
    - name: web
      protocol: HTTP
      port: {{ $root.listeners.web.port }}
    {{- end }}

    - name: websecure
      protocol: HTTPS
      port: {{ $root.listeners.websecure.port }}
      hostname: {{ include "gateway.hostname" . | trim }}
      tls:
        mode: {{ $root.listeners.websecure.tls.mode }}
        certificateRefs:
          {{- range $root.listeners.websecure.tls.certificateRefs }}
          - kind: Secret
            name: {{ printf "%s-%s-tls" .name $.Release.Name | trunc 63 | trimSuffix "-" }}
          {{- end }}
{{- end }}
