# Default values for paristake-ui.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

secretRef: []

image:
  repository: europe-west1-docker.pkg.dev/lenstech/paristake-ui/paristake-ui
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  {}
  # fsGroup: 2000

securityContext:
  {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    cert-manager.io/cluster-issuer: letsencrypt
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-passthrough: "false"
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
  # hosts:
  #   - host: hakibets.com
  #     paths:
  #       - path: /
  #         pathType: ImplementationSpecific
  # tls:
  #   - secretName: paristake-ui
  #     hosts:
  #       - hakibets.com

gatewayApi:
  enabled: true
  className: "traefik"
  hostname: "example.paristake"
  configureCertmanager: true
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    cert-manager.io/cluster-issuer: "letsencrypt-traefik"
  listeners:
    web:
      port: 8000
      protocol: HTTP
    websecure:
      port: 8443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - name: gw-ui

#TODO: Make env base as above
hostsGW:
  domain: paristake
  hostSuffix:
  https: true
  externalIP:

gatewayRoute:
  enabled: true
  gatewayName: "paristake-ui-gw"
  sectionName: "websecure"
  middlewares: []

hosts:
  dev: "dev.paristake.com"
  prod: "paristake.com"

environmentSuffix: "dev"

resources:
  limits:
    cpu: 2
    memory: 2Gi
  requests:
    cpu: 50m
    memory: 50Mi

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

properties:
  VITE_MATCHES_URL: ⁠⁠https://web.api.paristake.com
  VITE_INSTANT_URL: https://laki-instant.api.laki.co.ke
  VITE_AUTH_URL: ⁠⁠https://auth.api.paristake.com
  VITE_BET_URL: ⁠⁠https://bet.api.paristake.com
  VITE_CASINO_URL: ⁠https://soft.gaming.paristake.com

secrets:
