<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
    <linearGradient id="green-glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#45A704;stop-opacity:0.15"/>
      <stop offset="50%" style="stop-color:#57CC05;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#45A704;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="gold-glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#D4941A;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#D4941A;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative glow circles -->
  <circle cx="200" cy="315" r="300" fill="url(#green-glow)" opacity="0.6"/>
  <circle cx="1000" cy="200" r="250" fill="url(#gold-glow)" opacity="0.5"/>

  <!-- Subtle grid pattern -->
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="white" stroke-width="0.3" opacity="0.04"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="3" fill="#57CC05"/>

  <!-- Logo mark -->
  <rect x="80" y="80" width="56" height="56" rx="14" fill="#57CC05" opacity="0.15"/>
  <text x="108" y="118" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="900" fill="#57CC05" text-anchor="middle" dominant-baseline="middle">P</text>

  <!-- Brand name next to logo -->
  <text x="152" y="104" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="white" letter-spacing="0.5">7bet</text>
  <text x="152" y="122" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="white" opacity="0.3" letter-spacing="3" text-transform="uppercase">KENYA</text>

  <!-- Main headline -->
  <text x="80" y="250" font-family="system-ui, -apple-system, sans-serif" font-size="62" font-weight="800" fill="white" letter-spacing="-1">Sports Betting</text>
  <text x="80" y="320" font-family="system-ui, -apple-system, sans-serif" font-size="62" font-weight="800" fill="white" letter-spacing="-1">&amp; Casino</text>

  <!-- Accent underline -->
  <rect x="80" y="340" width="120" height="4" rx="2" fill="#57CC05"/>

  <!-- Subheading -->
  <text x="80" y="390" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="400" fill="white" opacity="0.5">Live odds. Instant M-Pesa payouts. Play anytime.</text>

  <!-- Feature pills -->
  <!-- Pill 1: Live Betting -->
  <rect x="80" y="440" width="150" height="38" rx="19" fill="white" opacity="0.06" stroke="white" stroke-opacity="0.1" stroke-width="1"/>
  <circle cx="104" cy="459" r="4" fill="#EF4444"/>
  <text x="115" y="464" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="white" opacity="0.7">Live Betting</text>

  <!-- Pill 2: Casino -->
  <rect x="245" y="440" width="120" height="38" rx="19" fill="white" opacity="0.06" stroke="white" stroke-opacity="0.1" stroke-width="1"/>
  <circle cx="269" cy="459" r="4" fill="#57CC05"/>
  <text x="280" y="464" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="white" opacity="0.7">Casino</text>

  <!-- Pill 3: Crash -->
  <rect x="380" y="440" width="110" height="38" rx="19" fill="white" opacity="0.06" stroke="white" stroke-opacity="0.1" stroke-width="1"/>
  <circle cx="404" cy="459" r="4" fill="#D4941A"/>
  <text x="415" y="464" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="white" opacity="0.7">Crash</text>

  <!-- Pill 4: Virtuals -->
  <rect x="505" y="440" width="120" height="38" rx="19" fill="white" opacity="0.06" stroke="white" stroke-opacity="0.1" stroke-width="1"/>
  <circle cx="529" cy="459" r="4" fill="#8B5CF6"/>
  <text x="540" y="464" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="white" opacity="0.7">Virtuals</text>

  <!-- Right side: decorative odds card -->
  <rect x="820" y="280" width="300" height="220" rx="20" fill="white" opacity="0.04" stroke="white" stroke-opacity="0.06" stroke-width="1"/>

  <!-- Odds card content -->
  <text x="850" y="320" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="white" opacity="0.3" letter-spacing="2">FEATURED MATCH</text>

  <text x="850" y="352" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="white" opacity="0.8">Arsenal vs Chelsea</text>
  <text x="850" y="374" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="white" opacity="0.3">Premier League • Today 21:00</text>

  <!-- Odds boxes -->
  <rect x="850" y="395" width="80" height="50" rx="10" fill="#57CC05" opacity="0.12" stroke="#57CC05" stroke-opacity="0.2" stroke-width="1"/>
  <text x="890" y="415" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="500" fill="white" opacity="0.4" text-anchor="middle">1</text>
  <text x="890" y="435" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="800" fill="#57CC05" text-anchor="middle">1.85</text>

  <rect x="940" y="395" width="80" height="50" rx="10" fill="white" opacity="0.04" stroke="white" stroke-opacity="0.08" stroke-width="1"/>
  <text x="980" y="415" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="500" fill="white" opacity="0.4" text-anchor="middle">X</text>
  <text x="980" y="435" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="800" fill="white" opacity="0.8" text-anchor="middle">3.40</text>

  <rect x="1030" y="395" width="80" height="50" rx="10" fill="white" opacity="0.04" stroke="white" stroke-opacity="0.08" stroke-width="1"/>
  <text x="1070" y="415" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="500" fill="white" opacity="0.4" text-anchor="middle">2</text>
  <text x="1070" y="435" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="800" fill="white" opacity="0.8" text-anchor="middle">4.20</text>

  <!-- Live badge on card -->
  <rect x="1042" y="305" width="55" height="22" rx="11" fill="#EF4444" opacity="0.15"/>
  <circle cx="1055" cy="316" r="3" fill="#EF4444"/>
  <text x="1063" y="320" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#EF4444">LIVE</text>

  <!-- Bottom bar -->
  <rect x="0" y="560" width="1200" height="70" fill="black" opacity="0.3"/>
  <text x="80" y="600" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="white" opacity="0.35">7bet.com</text>

  <!-- 18+ badge -->
  <rect x="1060" y="580" width="44" height="28" rx="6" fill="#EF4444" opacity="0.15" stroke="#EF4444" stroke-opacity="0.2" stroke-width="1"/>
  <text x="1082" y="599" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="900" fill="#EF4444" text-anchor="middle">18+</text>

  <!-- BCLB -->
  <text x="600" y="600" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="white" opacity="0.2" text-anchor="middle">Licensed by BCLB • BK 0000777 • Gamble Responsibly</text>
</svg>
