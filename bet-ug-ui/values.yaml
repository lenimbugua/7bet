# Default values for bet-ug-ui.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

secretRef: []

image:
  repository: europe-west1-docker.pkg.dev/lenstech/bet-ug-ui/bet-ug-ui
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  {}
  # fsGroup: 2000

securityContext:
  {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 80

environmentSuffix: dev

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    cert-manager.io/cluster-issuer: letsencrypt
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-passthrough: "false"
    nginx.ingress.kubernetes.io/ssl-redirect: "false"

  paths:
    - path: /
      pathType: Prefix

  tls: true

gatewayApi:
  hostname:
    - 7bet.ug
  enabled: true
  className: "tf-gateway"
  configureCertmanager: true
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    cert-manager.io/cluster-issuer: "letsencrypt-traefik"
    acme.cert-manager.io/http01-edit-in-place: "true"
  listeners:
    web:
      port: 8000
      protocol: HTTP
    websecure:
      port: 8443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - name: virtual-leagues

gatewayRoute:
  enabled: true
  gatewayName: "api-gateway"
  sectionName: "websecure"

hosts:
  dev:
    - dev.7bet.ug

  prod:
    - 7bet.ug

resources:
  limits:
    cpu: 2
    memory: 2Gi
  requests:
    cpu: 50m
    memory: 50Mi

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

properties:
  VITE_AUTH_BASE_URL: ⁠⁠https://laki-bets-auth-v1.api.hakibets.com
secrets:
